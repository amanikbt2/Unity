<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unity App - Admin Dashboard</title>
  <style>
    :root {
      --bg: #0A0612;
      --card-bg: #120C24;
      --border: rgba(255, 255, 255, 0.07);
      --text: #F3F4F6;
      --text-muted: #9CA3AF;
      --primary: #8B5CF6;
      --accent: #06B6D4;
      --danger: #F87171;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 20px 40px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 600;
      background: -webkit-linear-gradient(45deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tabs {
      display: flex;
      gap: 20px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(139, 92, 246, 0.2);
      color: var(--primary);
    }
    .view-section {
      display: none;
      flex: 1;
      flex-direction: column;
    }
    .view-section.active {
      display: flex;
    }

    /* Analytics View */
    .metrics {
      display: flex;
      gap: 20px;
      padding: 30px 40px;
    }
    .metric-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .metric-title {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .metric-value {
      font-size: 48px;
      font-weight: 700;
      margin-top: 10px;
      color: var(--primary);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 40px 40px 40px;
    }
    .terminal-header {
      background: #1A1B26;
      padding: 10px 20px;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      border-bottom: none;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background-color: #F87171; }
    .dot.yellow { background-color: #FBBF24; }
    .dot.green { background-color: #34D399; }
    .terminal-title {
      margin-left: 10px;
      font-family: monospace;
      color: var(--text-muted);
      font-size: 14px;
    }
    .terminal {
      background: #1A1B26;
      border: 1px solid var(--border);
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
    }
    .log-entry { margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; }
    .log-time { color: #565F89; }
    .log-user { color: #7DCFFF; font-weight: bold; }
    .log-event { color: #9ECE6A; font-weight: bold; }
    .log-details { color: #C0CAF5; margin-left: 10px; }

    /* Updates View */
    .updates-layout {
      display: flex;
      gap: 30px;
      padding: 30px 40px;
      flex: 1;
      overflow: hidden;
    }
    .form-panel, .feed-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .form-panel { flex: 1; }
    .feed-panel { flex: 1; }
    
    h2 { margin-top: 0; color: var(--text); font-size: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 14px; }
    input[type="text"], input[type="url"], textarea {
      width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; box-sizing: border-box;
    }
    input:focus, textarea:focus { outline: none; border-color: var(--primary); }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    
    .actions-config { background: rgba(0,0,0,0.1); padding: 12px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px; }
    .action-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    .action-row input[type="text"] { flex: 1; }
    .action-row input[type="url"] { flex: 2; }
    
    .btn {
      background: var(--primary); color: #fff; border: none; padding: 12px 24px; font-size: 16px;
      border-radius: 8px; cursor: pointer; font-weight: 600; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Popup Feed Items */
    .popup-card {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px;
    }
    .popup-header { display: flex; justify-content: space-between; align-items: center; }
    .popup-id { font-family: monospace; background: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; }
    .btn-danger { background: var(--danger); padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; color: white; cursor: pointer; }
    .btn-danger:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header>
    <h1>Unity Admin Dashboard</h1>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('analytics')">App Analytics</button>
      <button class="tab-btn" onclick="switchTab('updates')">Send Updates</button>
    </div>
  </header>

  <!-- Analytics View -->
  <div id="analytics-view" class="view-section active">
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-title">Total Registered Users</div>
        <div class="metric-value" id="stat-registered">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Currently Online</div>
        <div class="metric-value" id="stat-online" style="color: var(--accent);">--</div>
      </div>
    </div>
    <div class="main-content">
      <div class="terminal-header">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        <div class="terminal-title">bash - app-activity.log</div>
      </div>
      <div class="terminal" id="terminal">
        <div style="color: #9ECE6A;">[System] Listening for incoming app events...</div>
      </div>
    </div>
  </div>

  <!-- Updates View -->
  <div id="updates-view" class="view-section">
    <div class="updates-layout">
      <!-- Create Popup Form -->
      <div class="form-panel">
        <h2>Create App Announcer Popup</h2>
        <form id="popup-form">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="p-title" required placeholder="e.g. New Feature Alert!">
          </div>
          <div class="form-group">
            <label>Subtopic</label>
            <input type="text" id="p-subtopic" placeholder="e.g. Video Calls are here">
          </div>
          <div class="form-group">
            <label>Short Sentence (Body)</label>
            <textarea id="p-text" required placeholder="Describe the update briefly..."></textarea>
          </div>
          <div class="form-group">
            <label>Cover Image</label>
            <input type="file" id="p-image" accept="image/*">
          </div>
          
          <div class="checkbox-group">
            <input type="checkbox" id="p-important">
            <label for="p-important" style="margin:0; color:#fff;">Make Important (Non-dismissible by 'X')</label>
          </div>

          <div class="actions-config">
            <label>Action Buttons (Optional)</label>
            <div id="actions-list">
              <div class="action-row">
                <input type="text" placeholder="Button Label (e.g. Update Now)" class="a-label">
                <input type="url" placeholder="Redirect URL (https://...)" class="a-url">
              </div>
            </div>
            <button type="button" style="background:none; color:var(--accent); border:none; cursor:pointer;" onclick="addActionRow()">+ Add Another Button</button>
          </div>

          <button type="submit" class="btn" id="submit-popup-btn">Publish Popup</button>
        </form>
      </div>

      <!-- Feed Panel -->
      <div class="feed-panel">
        <h2>Previous Updates Feed</h2>
        <div id="popups-feed">
          <div style="color: var(--text-muted);">Loading popups...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(`${tabId}-view`).classList.add('active');
      event.target.classList.add('active');
      if (tabId === 'updates') loadPopups();
    }

    // Analytics Logic
    async function fetchStats() {
      try {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        document.getElementById('stat-registered').innerText = data.totalRegistered;
        document.getElementById('stat-online').innerText = data.totalOnline;
      } catch (err) {}
    }
    fetchStats();
    setInterval(fetchStats, 10000);

    const terminal = document.getElementById('terminal');
    function appendLog(log) {
      const el = document.createElement('div');
      el.className = 'log-entry';
      const time = new Date(log.timestamp).toLocaleTimeString();
      const detailsStr = typeof log.details === 'object' ? JSON.stringify(log.details) : log.details;
      el.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-user">${log.user}</span> <span class="log-event">${log.event}</span> <span class="log-details">${detailsStr !== '{}' ? detailsStr : ''}</span>`;
      terminal.appendChild(el);
      terminal.scrollTop = terminal.scrollHeight;
    }

    const evtSource = new EventSource('/api/admin/logs/stream');
    evtSource.onmessage = function(event) {
      const data = JSON.parse(event.data);
      if (data.type === 'history') data.logs.forEach(appendLog);
      else appendLog(data);
    };

    // Updates Logic
    function addActionRow() {
      const row = document.createElement('div');
      row.className = 'action-row';
      row.innerHTML = `<input type="text" placeholder="Button Label" class="a-label"> <input type="url" placeholder="Redirect URL" class="a-url"> <button type="button" onclick="this.parentElement.remove()" style="background:none;color:var(--danger);border:none;cursor:pointer;">X</button>`;
      document.getElementById('actions-list').appendChild(row);
    }

    async function loadPopups() {
      try {
        const res = await fetch('/api/admin/popups');
        const data = await res.json();
        const feed = document.getElementById('popups-feed');
        feed.innerHTML = '';
        if (!data.popups.length) {
          feed.innerHTML = '<div style="color:var(--text-muted);">No popups yet.</div>';
          return;
        }
        data.popups.forEach(p => {
          feed.innerHTML += `
            <div class="popup-card">
              <div class="popup-header">
                <div><span class="popup-id">${p.id}</span> <strong>${p.title}</strong></div>
                <button class="btn btn-danger" onclick="deletePopup('${p.id}')">Delete</button>
              </div>
              ${p.imageUrl ? `<img src="${p.imageUrl}" class="popup-img">` : ''}
              <div style="font-size:14px;color:var(--text-muted);">${p.subtopic}</div>
              <p style="margin:5px 0;font-size:14px;">${p.text}</p>
              ${p.isImportant ? '<div style="color:var(--danger);font-size:12px;">★ Important</div>' : ''}
              <div style="display:flex;gap:5px;margin-top:5px;">
                ${p.actions.map(a => `<span style="background:var(--primary);padding:2px 8px;border-radius:4px;font-size:12px;">${a.label}</span>`).join('')}
              </div>
            </div>
          `;
        });
      } catch (err) { console.error(err); }
    }

    async function deletePopup(id) {
      if(!confirm('Are you sure you want to delete this popup?')) return;
      await fetch(`/api/admin/popups/${id}`, { method: 'DELETE' });
      loadPopups();
    }

    document.getElementById('popup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-popup-btn');
      btn.innerText = 'Publishing...';
      btn.disabled = true;

      const actions = [];
      document.querySelectorAll('.action-row').forEach(row => {
        const label = row.querySelector('.a-label').value;
        const url = row.querySelector('.a-url').value;
        if (label) actions.push({ label, url });
      });

      const formData = new FormData();
      formData.append('title', document.getElementById('p-title').value);
      formData.append('subtopic', document.getElementById('p-subtopic').value);
      formData.append('text', document.getElementById('p-text').value);
      formData.append('isImportant', document.getElementById('p-important').checked);
      formData.append('actions', JSON.stringify(actions));

      const fileInput = document.getElementById('p-image');
      if (fileInput.files.length > 0) {
        formData.append('image', fileInput.files[0]);
      }

      try {
        const res = await fetch('/api/admin/popups', {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          e.target.reset();
          document.getElementById('actions-list').innerHTML = `
            <div class="action-row">
              <input type="text" placeholder="Button Label (e.g. Update Now)" class="a-label">
              <input type="url" placeholder="Redirect URL (https://...)" class="a-url">
            </div>
          `;
          loadPopups();
          alert('Popup published successfully!');
        }
      } catch (err) {
        console.error(err);
        alert('Failed to publish popup');
      } finally {
        btn.innerText = 'Publish Popup';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
